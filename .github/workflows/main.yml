name: 24/7 Study Stream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install ffmpeg fonts-liberation -y

      - name: Launch Stream
        run: |
          sleep 5
          ffmpeg -re -stream_loop -1 -i video.mp4 -stream_loop -1 -i rain.mp3 \
          -filter_complex "[0:v]scale=1280:720, \
          drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf:text='%{localtime\:%H}.%{localtime\:%M}':fontcolor=white:fontsize=45:x=w-tw-30:y=30:box=1:boxcolor=black@0.6, \
          drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf:text='SESSION %{gmtime\:t\:%H}h %{gmtime\:t\:%M}m':fontcolor=yellow:fontsize=30:x=30:y=30:box=1:boxcolor=black@0.6, \
          drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf:text='STUDY':fontcolor=white:fontsize=35:x=30:y=75:box=1:boxcolor=black@0.6:enable='lt(mod(t,3600),3000)', \
          drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf:text='BREAK':fontcolor=white:fontsize=35:x=30:y=75:box=1:boxcolor=black@0.6:enable='gte(mod(t,3600),3000)'[v]" \
          -map "[v]" -map 1:a:0 \
          -c:v libx264 -preset ultrafast -b:v 1500k -maxrate 1500k -bufsize 3000k -pix_fmt yuv420p -g 60 \
          -c:a aac -b:a 128k -f flv rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}
