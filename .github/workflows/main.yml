name: 24/7 Study Stream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install ffmpeg fonts-liberation -y

      - name: Launch Stream
        run: |
          sleep 5
          ffmpeg -re -stream_loop -1 -i video.mp4 -re -loop 1 -i break_pic.png -stream_loop -1 -i rain.mp3 \
          -filter_complex "[0:v]scale=1280:720[main]; [1:v]scale=1280:720[pic]; \
          [main][pic]overlay=enable='gte(mod(t,3600),3000)'[v_mixed]; \
          [v_mixed]drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf:text='%{localtime\:%H\x3a%M}':fontcolor=white:fontsize=45:x=w-tw-30:y=30:box=1:boxcolor=black@0.6, \
          drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf: \
          text='TIMER-%{gmtime\:t\:%H\x3a%M\x3a%S}':fontcolor=yellow:fontsize=60: \
          x='if(gte(mod(t,3600),3000),(w-tw)/2,30)':y=30:box=1:boxcolor=black@0.6, \
          drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf:text='STUDY SESSION':fontcolor=white:fontsize=35:x=30:y=75:box=1:boxcolor=black@0.6:enable='lt(mod(t,3600),3000)', \
          drawtext=fontfile=/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf:text='BREAK TIME':fontcolor=white:fontsize=40:x=(w-tw)/2:y=100:box=1:boxcolor=black@0.6:enable='gte(mod(t,3600),3000)'[v]" \
          -map "[v]" -map 2:a:0 \
          -c:v libx264 -preset ultrafast -b:v 1500k -maxrate 1500k -bufsize 3000k -pix_fmt yuv420p -g 60 \
          -c:a aac -b:a 128k -f flv rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}
